<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosibella Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-header__title">Lista produktów</h1>
        <p class="site-header__description">
          Zapraszamy do zakupu produktów.
        </p>
      </div>
    </header>

    <main class="app" id="app">
      <section class="toolbar" aria-labelledby="filters-title">
        <div class="toolbar__header">
          <div>
            <h2 class="toolbar__title" id="filters-title">Filtry i sortowanie</h2>
            <p class="toolbar__meta" id="results-summary" aria-live="polite">
              Pobieranie produktów...
            </p>
          </div>
          <button class="button button--ghost" id="clear-filters-button" type="button">
            Wyczyść filtry
          </button>
        </div>

        <form class="toolbar__form" id="filters-form">
          <div class="form-field">
            <label class="form-field__label" for="category-filter">Kategoria</label>
            <select class="form-field__control" id="category-filter" name="category">
              <option value="">Wszystkie kategorie</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="min-price-filter">Cena od</label>
            <input
              class="form-field__control"
              id="min-price-filter"
              name="minPrice"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.01"
              placeholder="np. 20"
            />
          </div>

          <div class="form-field">
            <label class="form-field__label" for="max-price-filter">Cena do</label>
            <input
              class="form-field__control"
              id="max-price-filter"
              name="maxPrice"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.01"
              placeholder="np. 100"
            />
          </div>

          <div class="form-field">
            <label class="form-field__label" for="sort-filter">Sortowanie</label>
            <select class="form-field__control" id="sort-filter" name="sortBy">
              <option value="default">Domyślne</option>
              <option value="price-asc">Cena rosnąco</option>
              <option value="price-desc">Cena malejąco</option>
              <option value="name-asc">Nazwa A-Z</option>
              <option value="name-desc">Nazwa Z-A</option>
            </select>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="page-size-filter">Na stronie</label>
            <select class="form-field__control" id="page-size-filter" name="pageSize">
              <option value="8">8</option>
              <option value="12">12</option>
              <option value="24">24</option>
            </select>
          </div>
        </form>
      </section>

      <section class="state-region" id="app-status" aria-live="polite" aria-atomic="true"></section>

      <section class="products-section" aria-labelledby="products-title">
        <h2 class="visually-hidden" id="products-title">Produkty</h2>
        <div class="products-grid" id="products-grid"></div>
      </section>

      <nav class="pagination" id="pagination" aria-label="Paginacja produktów"></nav>
    </main>
  </body>
</html>
